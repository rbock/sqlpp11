os:
  - Visual Studio 2015
  - Visual Studio 2022

platform:
  - x64

configuration:
  #- Debug
  - Release

matrix:
  fast_finish: true

install:
  - vcpkg install sqlite3:x64-windows

cache:
  - c:\tools\vcpkg\installed\

build_script:
  - CD
  - cd ..
  - CD
  - git clone https://github.com/HowardHinnant/date
  - cd date
  - git checkout tags/v2.4
  - cd ..
  - cd sqlpp11
  - CD
  - echo %configuration%
  - mkdir build
  - cd build
  - cmake --version
  - cmake .. -DCMAKE_CXX_FLAGS="/EHsc /wd4503" -DCMAKE_PREFIX_PATH="C:\projects\date" %CMAKE_TOOLCHAIN_FILE% -DBUILD_MYSQL_CONNECTOR=ON -DBUILD_POSTGRESQL_CONNECTOR=ON -DBUILD_SQLITE3_CONNECTOR=ON
  - cmake --build . --config %configuration%
  - cd tests
  - cd core
  - ctest . --build-config %configuration% --output-on-failure
